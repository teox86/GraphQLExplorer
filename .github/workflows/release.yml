name: Release

# Auto-create a GitHub release whenever changes land on main (i.e. when a PR
# is merged). The release is tagged from the version in package.json; bump that
# version to cut a new release. If the tag already exists, this is a no-op, so
# re-runs and unrelated pushes to main are safe.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether the tag already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $tag already exists - skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Build (hosted, chunked)
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Build (standalone single-file)
        if: steps.check.outputs.exists == 'false'
        run: npm run build:standalone

      - name: Package artifacts
        if: steps.check.outputs.exists == 'false'
        run: |
          version="${{ steps.version.outputs.version }}"
          # Double-click artifact: a single self-contained HTML file (no server needed).
          cp dist-standalone/index.html "GraphQL-Explorer-v${version}.html"
          # Hosted artifact: the normal chunked build for serving behind a web server.
          zip -r "graphql-explorer-v${version}-hosted.zip" dist

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="v${version}"
          gh release create "$tag" \
            --title "$tag" \
            --target "${{ github.sha }}" \
            --generate-notes \
            "GraphQL-Explorer-v${version}.html#GraphQL-Explorer-v${version}.html (double-click to run - no install needed)" \
            "graphql-explorer-v${version}-hosted.zip#Hosted build (serve behind a web server)"
